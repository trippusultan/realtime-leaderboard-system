version: "3.8"

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:5000"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped

  leaderboard:
    depends_on:
      - redis
    build: .
    environment:
      - APP_PORT=${APP_PORT:-3001}
      - REDIS_URL=redis://redis:5000
      - JWT_SECRET=${JWT_SECRET:-change-me}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-7d}
    ports:
      - "${APP_PORT:-3001}:5000"
    restart: unless-stopped

volumes:
  redis_data:

# Run with:
#   docker compose up
# Or destroy & recreate fresh:
#   docker compose down -v && docker compose up
